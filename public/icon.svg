<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2563EB" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="88" fill="url(#grad1)" filter="url(#shadow)"/>
  
  <!-- Document body -->
  <rect x="96" y="80" width="320" height="380" rx="16" fill="white"/>
  
  <!-- Document fold corner -->
  <path d="M336 80 L416 160 L336 160 Z" fill="#E5E7EB"/>
  <path d="M336 80 L336 160 L416 160" fill="none" stroke="#D1D5DB" stroke-width="2"/>
  
  <!-- PDF text -->
  <text x="160" y="220" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="url(#grad1)">PDF</text>
  
  <!-- Studio text -->
  <text x="130" y="310" font-family="Arial, sans-serif" font-size="36" font-weight="600" fill="#374151">STUDIO</text>
  
  <!-- Decorative lines -->
  <rect x="130" y="340" width="80" height="6" rx="3" fill="url(#grad1)"/>
  <rect x="130" y="356" width="60" height="6" rx="3" fill="#D1D5DB"/>
  
  <!-- Small accent -->
  <circle cx="360" cy="380" r="24" fill="url(#grad2)"/>
  <path d="M350 380 L370 380 M360 370 L360 390" stroke="white" stroke-width="4" stroke-linecap="round"/>
</svg>